<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILO Master Plate Pro - v1.8.8</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --overlay-bg: rgba(0, 0, 0, 0.6); 
            --card-bg: rgba(26, 26, 26, 0.95);
            --primary-yellow: #f1c40f; 
            --red-die: #e74c3c; 
        }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(var(--overlay-bg), var(--overlay-bg)), url('board.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; transition: 0.5s ease;
        }

        .header-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px; }
        .top-bar { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.8); padding: 8px 25px; border-radius: 30px; backdrop-filter: blur(10px); }
        .theme-switcher { display: flex; gap: 12px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .version-display { color: #fff; font-size: 14px; font-weight: bold; opacity: 0.8; }

        .mode-switcher { display: flex; background: rgba(34, 34, 34, 0.9); padding: 5px; border-radius: 15px; width: 100%; max-width: 350px; margin-bottom: 5px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: none; color: #aaa; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .mode-btn.active { background: var(--primary-yellow); color: #111; }

        .game-card { 
            width: 100%; max-width: 500px; background: var(--card-bg); backdrop-filter: blur(10px);
            border: 2px solid var(--primary-yellow); border-radius: 35px; padding: 20px; text-align: center; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); position: relative; margin-bottom: 20px; overflow: hidden;
        }

        /* ขยายพื้นที่จาน (plate.png) ให้ใหญ่ขึ้น */
        .dice-area { 
            position: relative; width: 100%; height: 320px; margin-bottom: 10px; 
            display: flex; justify-content: center; align-items: center;
            background-image: url('plate.png'); 
            background-size: 340px; /* ขนาดจานใหญ่ขึ้นตามรูปที่ส่งมา */
            background-repeat: no-repeat; background-position: center;
        }

        /* ฝาครอบขยายขนาดตามจาน */
        #singleCover { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 330px; height: 330px; 
            background-image: url('cover.png'); 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            z-index: 30; transition: transform 1.8s cubic-bezier(0.45, 0.05, 0.55, 0.95), opacity 1.2s; 
        }
        #singleCover.open { transform: translate(-50%, -160%); opacity: 0; pointer-events: none; }

        /* การจัดวางลูกเต๋าบนจาน */
        .main-results { 
            display: flex; justify-content: center; gap: 4px; width: 100%; 
            position: relative; z-index: 10; padding-top: 10px;
        }
        .dice-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 95px; }
        
        .result-box { 
            width: 85px; height: 85px; background: white; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            border: 3px solid transparent; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .result-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .item-label { font-size: 32px; font-weight: bold; min-height: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,1); }
        .red-text { color: var(--red-die) !important; }
        .yellow-text { color: var(--primary-yellow) !important; }

        .status-text { font-size: 26px; font-weight: bold; margin: 15px 0; min-height: 40px; text-shadow: 2px 2px 5px rgba(0,0,0,1); }
        .high { color: #2ecc71; } .low { color: #3498db; } .hilo { color: var(--red-die); animation: pulse 1s infinite; }

        .btn-group { display: flex; justify-content: center; gap: 15px; width: 100%; max-width: 420px; margin: 0 auto; }
        button { border: none; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.1s; font-family: 'Kanit', sans-serif; border-radius: 15px; }
        .btn-yellow { flex: 1; padding: 18px 10px; background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; box-shadow: 0 6px 0 #967a06; }
        .btn-open { flex: 1; padding: 18px 10px; background: #eee; color: #333; box-shadow: 0 6px 0 #bbb; }
        button:active { transform: translateY(4px); box-shadow: none !important; }

        .tod-section { width: 100%; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .tod-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: var(--primary-yellow); }
        .tod-display-wrap { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tod-row { background: rgba(34, 34, 34, 0.8); border-radius: 12px; padding: 6px; display: flex; gap: 6px; }
        .tod-box { width: 42px; height: 42px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .tod-box img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shakeCover { 0%, 100% { transform: translate(-50%, -50%) rotate(0); } 20% { transform: translate(-52%, -51%) rotate(-1deg); } 60% { transform: translate(-48%, -49%) rotate(1deg); } }
        .shaking-cover { animation: shakeCover 0.15s infinite; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="mode-switcher">
            <button id="modeHilo" class="mode-btn active" onclick="switchMode('hilo')">ไฮโล</button>
            <button id="modeFish" class="mode-btn" onclick="switchMode('fish')">น้ำเต้าปูปลา</button>
        </div>
        <div class="top-bar">
            <div class="theme-switcher">
                <div class="dot" style="background: #121212;" onclick="changeBg('rgba(0,0,0,0.7)')"></div>
                <div class="dot" style="background: #1e3d2b;" onclick="changeBg('rgba(30,61,43,0.7)')"></div>
                <div class="dot" style="background: #2c3e50;" onclick="changeBg('rgba(44,62,80,0.7)')"></div>
                <div class="dot" style="background: #4a1413;" onclick="changeBg('rgba(74,20,19,0.7)')"></div>
            </div>
            <div class="version-display">V. 1.8.8</div>
        </div>
    </div>

    <div class="game-card">
        <div class="dice-area">
            <!-- ฝาครอบซ้อนอยู่บนจาน -->
            <div id="singleCover"></div>
            
            <div id="diceGroup" class="main-results" style="opacity: 0;">
                <div class="dice-wrapper"><div id="d1" class="result-box"></div><div id="label1" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d2" class="result-box"></div><div id="label2" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d3" class="result-box"></div><div id="label3" class="item-label"></div></div>
            </div>
        </div>
        
        <div id="statusLabel" class="status-text">-</div>
        
        <div id="rollInitial"><div class="btn-group"><button class="btn-yellow" onclick="startShake()">เขย่าลูกเต๋า</button></div></div>
        
        <div id="rollSecondary" style="display:none;"><div class="btn-group"><button class="btn-yellow" onclick="startShake()">เขย่าเพิ่ม</button><button id="openBtn" class="btn-open" onclick="revealResults()">เปิดดูแต้ม</button></div></div>
        
        <div class="tod-section"><div class="tod-title">โต๊ด</div><div id="todDisplay" class="tod-display-wrap"></div></div>
    </div>

    <audio id="shakeSound" src="shake.mp3"></audio>
    <audio id="openSound" src="open.mp3"></audio>

    <script>
        const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzBOO8QhRgKmyM_XqlFioUcRmdK7zrvApY6BQY3bK8FQDZMnb3jCE04mXNdGXcVYGdzRQ/exec'; 

        let currentMode = 'hilo'; 
        let result = { d1: 0, d2: 0, d3: 0, total: 0, status: "", class: "" };
        const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeHilo').classList.toggle('active', mode === 'hilo');
            document.getElementById('modeFish').classList.toggle('active', mode === 'fish');
            resetUI();
        }

        function resetUI() {
            document.getElementById('statusLabel').innerText = "-";
            document.getElementById('statusLabel').className = "status-text";
            document.getElementById('diceGroup').style.opacity = "0";
            document.querySelectorAll('.item-label').forEach(el => el.innerText = "");
            document.querySelectorAll('.result-box').forEach(b => { b.innerHTML = ""; b.style.borderColor = "transparent"; });
            document.getElementById('todDisplay').innerHTML = `<div class="tod-row"><div class="tod-box" style="background:#333; color:var(--primary-yellow)">?</div><div class="tod-box" style="background:#333; color:var(--primary-yellow)">?</div></div>`.repeat(3);
            const cover = document.getElementById('singleCover');
            cover.classList.remove('open', 'shaking-cover');
            cover.style.display = "none";
        }

        function changeBg(rgbaColor) { document.documentElement.style.setProperty('--overlay-bg', rgbaColor); }

        function sendToGoogleSheet() {
            if (!GOOGLE_SHEET_URL || GOOGLE_SHEET_URL === "") return;
            let v1 = result.d1, v2 = result.d2, v3 = result.d3;
            if (currentMode === 'fish') { v1 = animalMap[result.d1]; v2 = animalMap[result.d2]; v3 = animalMap[result.d3]; }
            const params = new URLSearchParams({ mode: currentMode === 'hilo' ? 'ไฮโล' : 'น้ำเต้าปูปลา', d1: v1, d2: v2, d3: v3, total: result.total, status: result.status });
            fetch(GOOGLE_SHEET_URL + '?' + params.toString(), { mode: 'no-cors' });
        }

        function startShake() {
            if (navigator.vibrate) navigator.vibrate(50);
            const s = document.getElementById('shakeSound'); s.currentTime = 0; s.play().catch(()=>{});
            
            const cover = document.getElementById('singleCover');
            const statusLabel = document.getElementById('statusLabel');
            
            // 1. ซ่อนผลลัพธ์เก่าทั้งหมดทันที
            document.getElementById('diceGroup').style.opacity = "0";
            statusLabel.innerText = "กำลังเขย่า...";
            statusLabel.className = "status-text";
            document.getElementById('todDisplay').innerHTML = `<div class="tod-row"><div class="tod-box" style="background:#333; color:var(--primary-yellow)">?</div><div class="tod-box" style="background:#333; color:var(--primary-yellow)">?</div></div>`.repeat(3);
            
            // 2. แสดงฝาและเริ่มเขย่า
            cover.classList.remove('open');
            cover.style.display = "block";
            cover.classList.add('shaking-cover');
            
            document.getElementById('rollInitial').style.display = "none";
            document.getElementById('rollSecondary').style.display = "none";

            setTimeout(() => {
                cover.classList.remove('shaking-cover');
                result.d1 = Math.floor(Math.random() * 6) + 1;
                result.d2 = Math.floor(Math.random() * 6) + 1;
                result.d3 = Math.floor(Math.random() * 6) + 1;
                result.total = result.d1 + result.d2 + result.d3;
                result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
                result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");
                
                sendToGoogleSheet();
                
                statusLabel.innerText = "ปิดฝาเรียบร้อย!";
                document.getElementById('rollSecondary').style.display = "flex";
            }, 1200);
        }

        async function revealResults() {
            document.getElementById('rollSecondary').style.display = "none";
            const op = document.getElementById('openSound'); op.currentTime = 0; op.play().catch(()=>{});
            
            // 1. เลื่อนฝาเปิดขึ้น
            document.getElementById('singleCover').classList.add('open');
            
            // 2. แสดงผลลูกเต๋า
            const dice = [result.d1, result.d2, result.d3];
            const isRed = (v) => (v === 1 || v === 4);
            
            dice.forEach((val, i) => {
                const box = document.getElementById(`d${i+1}`);
                const label = document.getElementById(`label${i+1}`);
                const prefix = (currentMode === 'hilo') ? 'h' : '';
                box.innerHTML = `<img src="${prefix}${val}.jpg">`;
                box.style.borderColor = isRed(val) ? "var(--red-die)" : "transparent";
                label.innerText = (currentMode === 'hilo') ? val : animalMap[val];
                label.className = `item-label ${isRed(val) ? 'red-text' : 'yellow-text'}`;
            });

            // ค่อยๆ ให้ลูกเต๋าปรากฏขึ้นพร้อมฝาเปิด
            setTimeout(() => { document.getElementById('diceGroup').style.opacity = "1"; }, 100);

            const getT = (v) => `<div class="tod-box" style="border:2px solid ${isRed(v)?'var(--red-die)':'transparent'}"><img src="${currentMode==='hilo'?'h':''}${v}.jpg"></div>`;
            document.getElementById('todDisplay').innerHTML = `<div class="tod-row">${getT(result.d1)}${getT(result.d2)}</div><div class="tod-row">${getT(result.d1)}${getT(result.d3)}</div><div class="tod-row">${getT(result.d2)}${getT(result.d3)}</div>`;

            document.getElementById('statusLabel').innerText = `${result.status} (${result.total})`;
            document.getElementById('statusLabel').className = "status-text " + result.class;

            setTimeout(async () => {
                for (let val of dice) { await playVoice(`${(currentMode === 'hilo') ? 'n' : 'a'}${val}.mp3`); }
                if (currentMode === 'hilo') {
                    let sVoice = result.total === 11 ? "hilo11.mp3" : (result.total <= 10 ? "low.mp3" : "high.mp3");
                    await playVoice(sVoice);
                }
                document.getElementById('rollInitial').style.display = "block";
                document.getElementById('rollInitial').querySelector('button').innerText = "เขย่ารอบใหม่";
            }, 600);
        }

        function playVoice(f) {
            return new Promise((resolve) => {
                const a = new Audio(f); a.playbackRate = 1.5;
                a.play().catch(() => resolve()); a.onended = resolve;
                setTimeout(resolve, 800);
            });
        }

        window.onload = resetUI;
    </script>
</body>
</html>
