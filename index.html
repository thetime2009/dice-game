<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILO Master Pro - v2.1.9</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --overlay-bg: rgb(0, 88, 31); 
            --card-bg: rgba(26, 26, 26, 0.95);
            --primary-yellow: #f1c40f; 
            --red-die: #e74c3c; 
        }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(var(--overlay-bg), var(--overlay-bg)), url('board.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; overflow-x: hidden;
        }

        /* --- Popup System --- */
        #welcomePopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        #welcomePopup.show { opacity: 1; visibility: visible; }
        .welcome-card { background: rgba(30,30,30,0.95); width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 40px; border: 2px solid var(--primary-yellow); text-align: center; transform: scale(0.8); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #welcomePopup.show .welcome-card { transform: scale(1); }
        .btn-start { background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; border: none; padding: 18px 45px; border-radius: 20px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #967a06; active: transform: translateY(4px); }

        /* --- Header & Layout --- */
        .header-container { width: 100%; max-width: 600px; z-index: 100; margin-bottom: 15px; }
        .mode-switcher { display: flex; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 20px; margin-bottom: 10px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; background: none; color: #aaa; font-weight: bold; font-size: 16px; cursor: pointer; }
        .mode-btn.active { background: var(--primary-yellow); color: #111; }
        
        .control-panel { background: rgba(0,0,0,0.8); border-radius: 20px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .speed-control { display: flex; align-items: center; gap: 8px; }
        .speed-btn { background: #444; color: white; border: none; width: 28px; height: 28px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* --- Game Core --- */
        .game-card { width: 100%; max-width: 600px; background: var(--card-bg); border: 2px solid var(--primary-yellow); border-radius: 40px; padding: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; z-index: 50; }
        .dice-area { position: relative; width: 100%; height: 400px; display: flex; justify-content: center; align-items: center; background: url('plate.png') no-repeat center; background-size: contain; margin-bottom: 15px; }
        
        #singleCover { position: absolute; width: 90%; height: 90%; background: url('cover.png') no-repeat center; background-size: contain; z-index: 100; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        #singleCover.open { transform: translateY(-120%); opacity: 0.8; }

        .main-results { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; width: 100%; opacity: 0; transition: 0.3s; z-index: 80; }
        .result-box { width: 100px; height: 100px; background: white; border-radius: 15px; overflow: hidden; border: 3px solid transparent; }
        .result-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-label { font-size: 32px; font-weight: bold; color: var(--primary-yellow); margin-top: 5px; }

        /* --- Buttons Section --- */
        .button-group { position: relative; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .btn-gold { width: 100%; padding: 20px; background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; font-size: 22px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0 #967a06; }
        .btn-gold:active { transform: translateY(3px); box-shadow: 0 2px 0 #967a06; }

        .tray-section { margin-top: 20px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: space-around; }
        .mini-box { width: 50px; height: 50px; background: #fff; color: #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        /* --- History --- */
        .history-container { width: 100%; max-width: 600px; margin-top: 20px; padding-bottom: 40px; }
        .history-item { background: rgba(0,0,0,0.5); padding: 12px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; border-left: 4px solid var(--primary-yellow); }

        /* --- Animations --- */
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, 2px) rotate(1deg); } }
        
        @media (max-width: 500px) { .dice-area { height: 300px; } .result-box { width: 80px; height: 80px; } }
    </style>
</head>
<body>

    <div id="welcomePopup" class="show">
        <div class="welcome-card">
            <div class="welcome-icon">🌟</div>
            <div class="welcome-title">ยินดีต้อนรับ</div>
            <div class="welcome-brand">ปิ่นทอง Master Pro</div>
            <p>กรุณากดปุ่มด้านล่างเพื่อเริ่มระบบ</p>
            <button class="btn-start" onclick="unlockSystem()">เริ่มเล่นกันเลย</button>
        </div>
    </div>

    <div class="header-container">
        <div class="mode-switcher">
            <button id="btnHilo" class="mode-btn active" onclick="setMode('hilo')">ไฮ-โล</button>
            <button id="btnFish" class="mode-btn" onclick="setMode('fish')">น้ำเต้าปูปลา</button>
        </div>
        <div class="control-panel">
            <div class="speed-control">
                <span>ความเร็วเสียง:</span>
                <button class="speed-btn" onclick="changeSpeed(-0.1)">-</button>
                <span id="speedVal">1.3</span>
                <button class="speed-btn" onclick="changeSpeed(0.1)">+</button>
            </div>
            <span style="opacity: 0.5; font-size: 12px;">V.2.1.9</span>
        </div>
    </div>

    <div class="game-card">
        <div id="diceArea" class="dice-area">
            <div id="singleCover"></div>
            <div id="diceGroup" class="main-results">
                <div class="dice-wrapper"><div id="d1" class="result-box"></div><div id="l1" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d2" class="result-box"></div><div id="l2" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d3" class="result-box"></div><div id="l3" class="item-label"></div></div>
            </div>
        </div>

        <div id="statusLabel" style="font-size:24px; margin-bottom:15px; font-weight:bold; color:var(--primary-yellow);">-</div>

        <div class="button-group">
            <div id="boxInitial">
                <button class="btn-gold" onclick="startShake('normal')">เขย่าลูกเต๋า</button>
            </div>
            <div id="boxSecondary" style="display:none; gap:10px;">
                <button style="flex:1; background:#444; color:#fff; border-radius:15px; border:none; font-weight:bold;" onclick="startShake('rin')">ริน</button>
                <button class="btn-gold" style="flex:2;" onclick="openCover()">เปิดดูแต้ม</button>
            </div>
        </div>

        <div class="tray-section">
            <div class="mini-box" onclick="cheat('low')">ต่ำ</div>
            <div class="mini-box" onclick="cheat('hilo')">11</div>
            <div class="mini-box" onclick="cheat('high')">สูง</div>
            <button onclick="applyPowder()" style="background:#fff; border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">ทาแป้ง</button>
        </div>
    </div>

    <div class="history-container" id="historyList"></div>

    <script>
        let currentMode = 'hilo', voiceSpeed = 1.3, isBusy = false;
        let result = { d1: 1, d2: 1, d3: 1, total: 3, status: "ต่ำ" };
        const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

        // --- 1. ปลดล็อกระบบสำหรับมือถือ ---
        function unlockSystem() {
            document.getElementById('welcomePopup').classList.remove('show');
            // ปลดล็อก Audio Context
            const silent = new Audio('shake.mp3');
            silent.muted = true;
            silent.play().then(() => { silent.pause(); silent.muted = false; });

            // ขอสิทธิ์ Sensor (iOS)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permission => {
                    if(permission === 'granted') initMotion();
                });
            } else {
                initMotion();
            }
        }

        function initMotion() {
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                if (acc && Math.abs(acc.x) + Math.abs(acc.y) > 25 && !isBusy) startShake('normal');
            });
        }

        // --- 2. ฟังก์ชันเกมหลัก ---
        function setMode(m) {
            currentMode = m;
            document.getElementById('btnHilo').classList.toggle('active', m === 'hilo');
            document.getElementById('btnFish').classList.toggle('active', m === 'fish');
            resetUI();
        }

        function resetUI() {
            document.getElementById('diceGroup').style.opacity = "0";
            document.getElementById('singleCover').classList.remove('open');
            document.getElementById('singleCover').style.display = "none";
            document.getElementById('boxInitial').style.display = "block";
            document.getElementById('boxSecondary').style.display = "none";
            document.getElementById('statusLabel').innerText = "-";
            isBusy = false;
        }

        function startShake(type) {
            if (isBusy) return;
            isBusy = true;

            const cover = document.getElementById('singleCover');
            const status = document.getElementById('statusLabel');
            
            cover.style.display = "block";
            cover.classList.remove('open');
            cover.classList.add('shaking');
            document.getElementById('diceArea').classList.add('shaking');
            
            status.innerText = type === 'rin' ? "กำลังริน..." : "กำลังเขย่า...";
            new Audio(type === 'rin' ? 'shake_light.mp3' : 'shake.mp3').play().catch(()=>{});

            setTimeout(() => {
                cover.classList.remove('shaking');
                document.getElementById('diceArea').classList.remove('shaking');
                status.innerText = "ปิดฝาแล้ว!";
                
                // สุ่มถ้ายังไม่มีการ Cheat
                if (isBusy) {
                    const d1 = Math.floor(Math.random() * 6) + 1;
                    const d2 = Math.floor(Math.random() * 6) + 1;
                    const d3 = Math.floor(Math.random() * 6) + 1;
                    setResult(d1, d2, d3);
                }

                document.getElementById('boxInitial').style.display = "none";
                document.getElementById('boxSecondary').style.display = "flex";
                isBusy = false;
            }, 1200);
        }

        function setResult(d1, d2, d3) {
            const sum = d1 + d2 + d3;
            result = {
                d1, d2, d3, total: sum,
                status: sum === 11 ? "11 ไฮโล" : (sum > 11 ? "สูง" : "ต่ำ")
            };
        }

        async function openCover() {
            if (isBusy) return;
            isBusy = true;
            
            document.getElementById('singleCover').classList.add('open');
            new Audio('open.mp3').play().catch(()=>{});

            // แสดงผล
            const prefix = currentMode === 'hilo' ? 'h' : '';
            [result.d1, result.d2, result.d3].forEach((v, i) => {
                const box = document.getElementById(`d${i+1}`);
                box.innerHTML = `<img src="${prefix}${v}.jpg">`;
                box.style.borderColor = (v===1 || v===4) ? "var(--red-die)" : "transparent";
                document.getElementById(`l${i+1}`).innerText = currentMode === 'hilo' ? v : animalMap[v];
            });

            setTimeout(() => { document.getElementById('diceGroup').style.opacity = "1"; }, 200);
            document.getElementById('statusLabel').innerText = `${result.status} (${result.total})`;

            addToHistory();

            // ขานเสียง
            setTimeout(async () => {
                const dice = [result.d1, result.d2, result.d3];
                for (let v of dice) {
                    const sound = new Audio(`${currentMode === 'hilo' ? 'n' : 'a'}${v}.mp3`);
                    sound.playbackRate = voiceSpeed;
                    sound.play().catch(()=>{});
                    await new Promise(r => setTimeout(r, 1000 / voiceSpeed));
                }
                document.getElementById('boxInitial').style.display = "block";
                document.getElementById('boxSecondary').style.display = "none";
                isBusy = false;
            }, 500);
        }

        function cheat(type) {
            let d1, d2, d3, sum;
            do {
                d1 = Math.floor(Math.random() * 6) + 1;
                d2 = Math.floor(Math.random() * 6) + 1;
                d3 = Math.floor(Math.random() * 6) + 1;
                sum = d1 + d2 + d3;
            } while (
                (type === 'low' && (sum > 10 || sum === 11)) ||
                (type === 'high' && (sum < 12)) ||
                (type === 'hilo' && sum !== 11)
            );
            setResult(d1, d2, d3);
            if (navigator.vibrate) navigator.vibrate(40);
            document.getElementById('statusLabel').innerText = "พร้อมแล้ว!";
        }

        function applyPowder() {
            document.getElementById('statusLabel').innerText = "กำลังลงแป้งปิ่นทอง...";
            document.getElementById('diceArea').style.filter = "brightness(1.5) sepia(0.5)";
            new Audio('shake_light.mp3').play().catch(()=>{});
            setTimeout(() => {
                document.getElementById('diceArea').style.filter = "none";
                document.getElementById('statusLabel').innerText = "ทาแป้งเสร็จแล้ว!";
            }, 2000);
        }

        function addToHistory() {
            const h = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>[${result.d1}, ${result.d2}, ${result.d3}]</span> <b>${result.status}</b> <span>${result.total}</span>`;
            h.prepend(item);
            if (h.children.length > 5) h.removeChild(h.lastChild);
        }

        function changeSpeed(v) {
            voiceSpeed = Math.min(Math.max(voiceSpeed + v, 0.8), 2.2);
            document.getElementById('speedVal').innerText = voiceSpeed.toFixed(1);
        }
    </script>
</body>
</html>
