<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILO Master UI Pro</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1a1a1a; --primary-yellow: #f1c40f; }
        body { 
            font-family: 'Kanit', sans-serif; background-color: var(--bg-color); 
            color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: background-color 0.5s ease;
        }

        /* ส่วนบน: เลือกสี */
        .header { margin: 20px 0; display: flex; gap: 10px; background: #222; padding: 10px 20px; border-radius: 30px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 1.5px solid #555; }

        /* Layout หลัก */
        .container { display: flex; gap: 30px; align-items: flex-start; margin-top: 10px; flex-wrap: wrap; justify-content: center; }

        /* ฝั่งซ้าย: โต๊ด */
        .tod-section { text-align: center; width: 140px; }
        .tod-title { font-size: 32px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; }
        .tod-row { background: #222; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; gap: 10px; justify-content: center; }
        .tod-box { width: 45px; height: 45px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }

        /* ฝั่งขวา: การ์ดเกม */
        .game-card {
            width: 320px; background: var(--card-bg); border: 2px solid var(--primary-yellow);
            border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .mini-dice { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .mini-icon { font-size: 28px; opacity: 0.8; }

        .main-results { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .result-box { 
            width: 75px; height: 75px; background: white; color: black; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* สถานะเลข 1 และ 4 เป็นสีแดง */
        .red-num { color: #e74c3c !important; }
        .hidden { background: #333 !important; color: #333 !important; transform: rotateY(180deg); position: relative; }
        .hidden::after { content: "?"; color: var(--primary-yellow); position: absolute; transform: rotateY(180deg); font-size: 30px; }

        .total-info { font-size: 16px; color: #888; margin: 10px 0; }
        .status-text { font-size: 30px; font-weight: bold; margin-bottom: 20px; }
        .high { color: #2ecc71; } .low { color: #3498db; } .hilo { color: #e74c3c; animation: pulse 1s infinite; }

        /* ปุ่มเขย่าใหม่ (ตามภาพเป็นสีเหลือง) */
        .btn-yellow { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold;
            background: linear-gradient(to bottom, #f1c40f, #d4ac0d); cursor: pointer; color: #222;
            box-shadow: 0 4px 0 #967a06; transition: 0.1s;
        }
        .btn-yellow:active { transform: translateY(3px); box-shadow: none; }
        .btn-open { background: #eee; color: #333; margin-top: 10px; display: none; box-shadow: 0 4px 0 #bbb; }

        /* ส่วนประวัติ (ล่างสุด) */
        .history-container { width: 450px; margin-top: 30px; padding-bottom: 50px; }
        .history-item { 
            background: #1e1e1e; border-radius: 15px; padding: 12px 20px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; font-size: 16px;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 1px); } }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

    <div class="header">
        <div class="dot" style="background: #121212;" onclick="changeBg('#121212')"></div>
        <div class="dot" style="background: #1e3d2b;" onclick="changeBg('#1e3d2b')"></div>
        <div class="dot" style="background: #2c3e50;" onclick="changeBg('#2c3e50')"></div>
        <div class="dot" style="background: #4a1413;" onclick="changeBg('#4a1413')"></div>
    </div>

    <div class="container">
        <!-- ฝั่งซ้าย: โต๊ด -->
        <div class="tod-section">
            <div class="tod-title">โต๊ด</div>
            <div id="todDisplay">
                <div class="tod-row"><div class="tod-box">-</div><div class="tod-box">-</div></div>
                <div class="tod-row"><div class="tod-box">-</div><div class="tod-box">-</div></div>
                <div class="tod-row"><div class="tod-box">-</div><div class="tod-box">-</div></div>
            </div>
        </div>

        <!-- ฝั่งขวา: กระดานหลัก -->
        <div class="game-card">
            <div class="mini-dice">
                <div id="mi1" class="mini-icon">🎲</div>
                <div id="mi2" class="mini-icon">🎲</div>
                <div id="mi3" class="mini-icon">🎲</div>
            </div>

            <div class="main-results" id="mainBoard">
                <div id="d1" class="result-box">-</div>
                <div id="d2" class="result-box">-</div>
                <div id="d3" class="result-box">-</div>
            </div>

            <div class="total-info" id="totalText">แต้มรวม: -</div>
            <div id="statusLabel" class="status-text">-</div>

            <button id="rollBtn" class="btn-yellow" onclick="startShake()">เขย่าใหม่</button>
            <button id="openBtn" class="btn-yellow btn-open" onclick="revealResults()">เปิดดูแต้ม</button>
        </div>
    </div>

    <div class="history-container">
        <div style="margin-bottom: 15px; color: #888;">📊 ประวัติการทอย</div>
        <div id="historyList"></div>
    </div>

    <audio id="shakeSound" src="https://soundjay.com"></audio>
    <audio id="openSound" src="https://soundjay.com"></audio>

    <script>
        let result = { d1: 0, d2: 0, d3: 0, total: 0, status: "", class: "" };
        const diceIcons = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

        function changeBg(color) { document.documentElement.style.setProperty('--bg-color', color); }

        function startShake() {
            document.getElementById('shakeSound').play();
            const boxes = document.querySelectorAll('.result-box');
            const rollBtn = document.getElementById('rollBtn');
            
            rollBtn.disabled = true;
            document.getElementById('statusLabel').innerText = "กำลังเขย่า...";
            document.getElementById('mainBoard').classList.add('shaking');

            boxes.forEach(box => {
                box.classList.add('hidden');
                box.classList.remove('red-num');
                box.innerText = "";
            });

            setTimeout(() => {
                document.getElementById('mainBoard').classList.remove('shaking');
                prepareData();
            }, 1500);
        }

        function prepareData() {
            result.d1 = Math.floor(Math.random() * 6) + 1;
            result.d2 = Math.floor(Math.random() * 6) + 1;
            result.d3 = Math.floor(Math.random() * 6) + 1;
            result.total = result.d1 + result.d2 + result.d3;

            if (result.total === 11) { result.status = "11-HI-LO"; result.class = "hilo"; }
            else if (result.total <= 10) { result.status = "ต่ำ (LOW)"; result.class = "low"; }
            else { result.status = "สูง (HIGH)"; result.class = "high"; }

            document.getElementById('rollBtn').style.display = "none";
            document.getElementById('rollBtn').disabled = false;
            document.getElementById('openBtn').style.display = "block";
            document.getElementById('statusLabel').innerText = "รอลุ้นผล...";
        }

        function revealResults() {
            document.getElementById('openSound').play();
            const dice = [result.d1, result.d2, result.d3];
            
            // แสดงผลหลัก
            dice.forEach((val, i) => {
                const box = document.getElementById(`d${i+1}`);
                const icon = document.getElementById(`mi${i+1}`);
                box.innerText = val;
                box.classList.remove('hidden');
                icon.innerText = diceIcons[val-1];
                if (val === 1 || val === 4) {
                    box.classList.add('red-num');
                    icon.classList.add('red-num');
                } else {
                    icon.classList.remove('red-num');
                }
            });

            // แสดงโต๊ด (จับคู่)
            const todHTML = `
                <div class="tod-row">
                    <div class="tod-box ${result.d1==1||result.d1==4?'red-num':''}">${result.d1}</div>
                    <div class="tod-box ${result.d2==1||result.d2==4?'red-num':''}">${result.d2}</div>
                </div>
                <div class="tod-row">
                    <div class="tod-box ${result.d1==1||result.d1==4?'red-num':''}">${result.d1}</div>
                    <div class="tod-box ${result.d3==1||result.d3==4?'red-num':''}">${result.d3}</div>
                </div>
                <div class="tod-row">
                    <div class="tod-box ${result.d2==1||result.d2==4?'red-num':''}">${result.d2}</div>
                    <div class="tod-box ${result.d3==1||result.d3==4?'red-num':''}">${result.d3}</div>
                </div>
            `;
            document.getElementById('todDisplay').innerHTML = todHTML;

            document.getElementById('totalText').innerText = `แต้มรวม: ${result.total}`;
            const label = document.getElementById('statusLabel');
            label.innerText = result.status;
            label.className = "status-text " + result.class;

            addToHistory();
            document.getElementById('rollBtn').style.display = "block";
            document.getElementById('openBtn').style.display = "none";
        }

        function addToHistory() {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            
            const format = (v) => (v === 1 || v === 4) ? `<span class="red-num">${v}</span>` : v;
            
            item.innerHTML = `
                <span style="color:#aaa">[${format(result.d1)}, ${format(result.d2)}, ${format(result.d3)}]</span>
                <span class="${result.class}">${result.status}</span>
                <span style="color:#aaa">รวม: ${result.total}</span>
            `;
            historyList.insertBefore(item, historyList.firstChild);
            if (historyList.children.length > 5) historyList.removeChild(historyList.lastChild);
        }
    </script>
</body>
</html>
