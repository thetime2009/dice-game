
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILO Master Ultimate - v1.6.3</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1a1a1a; --primary-yellow: #f1c40f; --red-die: #e74c3c; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background-color 0.5s ease; }

        .header-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px; }
        
        .mode-switcher { display: flex; background: #222; padding: 5px; border-radius: 15px; width: 100%; max-width: 350px; margin-bottom: 5px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: none; color: #666; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .mode-btn.active { background: var(--primary-yellow); color: #111; }

        .top-bar { display: flex; align-items: center; gap: 15px; background: #222; padding: 8px 25px; border-radius: 30px; }
        .theme-switcher { display: flex; gap: 12px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #555; }
        .version-display { color: #fff; font-size: 16px; font-weight: bold; font-family: sans-serif; letter-spacing: 1px; }

        .game-card { width: 100%; max-width: 500px; background: var(--card-bg); border: 2px solid var(--primary-yellow); border-radius: 30px; padding: 25px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; margin-bottom: 20px; }
        .dice-area { position: relative; width: 100%; height: 220px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        #singleCover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('cover.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 20; display: none; }

        .main-results { display: flex; justify-content: center; gap: 15px; width: 100%; }
        .dice-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; }
        .result-box { width: 100px; height: 100px; background: white; color: black; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 15px rgba(0,0,0,0.4); overflow: hidden; border: 4px solid transparent; }
        .result-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .item-label { font-size: 38px; font-weight: bold; min-height: 55px; line-height: 1; }
        .red-text { color: var(--red-die) !important; }
        .yellow-text { color: var(--primary-yellow) !important; }

        .status-text { font-size: 28px; font-weight: bold; margin-bottom: 20px; min-height: 40px; }
        .high { color: #2ecc71; } .low { color: #3498db; } .hilo { color: var(--red-die); animation: pulse 1s infinite; }

        .btn-group { display: flex; justify-content: center; gap: 15px; width: 100%; max-width: 400px; margin: 0 auto; }
        button { border: none; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.1s; font-family: 'Kanit', sans-serif; border-radius: 15px; }
        
        .btn-yellow { flex: 1; padding: 18px 10px; background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; box-shadow: 0 6px 0 #967a06; }
        .btn-open { flex: 1; padding: 18px 10px; background: #eee; color: #333; box-shadow: 0 6px 0 #bbb; }
        button:active { transform: translateY(4px); box-shadow: none !important; }

        .tod-section { width: 100%; margin-top: 10px; border-top: 1px solid #333; padding-top: 15px; }
        .tod-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: var(--primary-yellow); }
        .tod-display-wrap { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tod-row { background: #222; border-radius: 15px; padding: 8px; display: flex; gap: 8px; }
        .tod-box { width: 45px; height: 45px; background: white; color: black; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid transparent; }
        .tod-box img { width: 100%; height: 100%; object-fit: cover; }
        .tod-box.hidden-tod { background: #333; color: var(--primary-yellow); }
        .tod-box.hidden-tod::after { content: "?"; font-size: 22px; }

        .history-container { width: 100%; max-width: 500px; margin-top: 10px; padding-bottom: 50px; }
        .history-item { background: #1e1e1e; border-radius: 15px; padding: 12px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; border-left: 5px solid #333; }

        @keyframes shakeCover { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-4px, -3px); } 60% { transform: translate(4px, 2px); } }
        .shaking-cover { animation: shakeCover 0.15s infinite; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="mode-switcher">
            <button id="modeHilo" class="mode-btn active" onclick="switchMode('hilo')">ไฮโล</button>
            <button id="modeFish" class="mode-btn" onclick="switchMode('fish')">น้ำเต้าปูปลา</button>
        </div>
        <div class="top-bar">
            <div class="theme-switcher">
                <div class="dot" style="background: #121212;" onclick="changeBg('#121212')"></div>
                <div class="dot" style="background: #1e3d2b;" onclick="changeBg('#1e3d2b')"></div>
                <div class="dot" style="background: #2c3e50;" onclick="changeBg('#2c3e50')"></div>
                <div class="dot" style="background: #4a1413;" onclick="changeBg('#4a1413')"></div>
            </div>
            <div class="version-display">V. 1.6.3</div>
        </div>
    </div>

    <div class="game-card">
        <div class="dice-area">
            <div id="singleCover"></div>
            <div id="diceGroup" class="main-results">
                <div class="dice-wrapper"><div id="d1" class="result-box"></div><div id="label1" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d2" class="result-box"></div><div id="label2" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d3" class="result-box"></div><div id="label3" class="item-label"></div></div>
            </div>
        </div>

        <div id="statusLabel" class="status-text">-</div>
        
        <div id="rollInitial">
            <div class="btn-group">
                <button class="btn-yellow" onclick="startShake()">เขย่าลูกเต๋า</button>
            </div>
        </div>
        
        <div id="rollSecondary" style="display:none;">
            <div class="btn-group">
                <button class="btn-yellow" onclick="startShake()">เขย่าเพิ่ม</button>
                <button id="openBtn" class="btn-open" onclick="revealResults()">เปิดดูแต้ม</button>
            </div>
        </div>

        <div class="tod-section">
            <div class="tod-title">โต๊ด</div>
            <div id="todDisplay" class="tod-display-wrap"></div>
        </div>
    </div>

    <div class="history-container"><div id="historyList"></div></div>

    <audio id="shakeSound" src="shake.mp3"></audio>
    <audio id="openSound" src="open.mp3"></audio>

    <script>
        // *** ใส่ URL Apps Script ของคุณที่นี่ ***
        const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzX21IzoycDNdXkUTP58b-qsRQQQ3bgW0oOG6rmigzYkeRXJIsLLNiquAUztpSAzssrcQ/exec'; 
        
        let currentMode = 'hilo'; 
        let result = { d1: 0, d2: 0, d3: 0, total: 0, status: "", class: "" };
        const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeHilo').classList.toggle('active', mode === 'hilo');
            document.getElementById('modeFish').classList.toggle('active', mode === 'fish');
            resetUI();
        }

        function resetUI() {
            document.getElementById('statusLabel').innerText = "-";
            document.getElementById('statusLabel').className = "status-text";
            document.querySelectorAll('.item-label').forEach(el => el.innerText = "");
            document.querySelectorAll('.result-box').forEach(b => { b.innerHTML = ""; b.style.borderColor = "transparent"; });
            document.getElementById('todDisplay').innerHTML = `<div class="tod-row"><div class="tod-box hidden-tod"></div><div class="tod-box hidden-tod"></div></div>`.repeat(3);
        }

        function changeBg(color) { document.documentElement.style.setProperty('--bg-color', color); }

        // --- ฟังก์ชันส่งข้อมูลไป Google Sheets (ปรับปรุงใหม่ตามโหมด) ---
        function sendToGoogleSheet() {
            if (!GOOGLE_SHEET_URL || GOOGLE_SHEET_URL === "") return;

            // กำหนดค่าที่จะส่ง: ถ้าเป็นโหมดน้ำเต้าปูปลา ให้ส่งเป็นชื่อสัตว์
            let val1 = result.d1;
            let val2 = result.d2;
            let val3 = result.d3;

            if (currentMode === 'fish') {
                val1 = animalMap[result.d1];
                val2 = animalMap[result.d2];
                val3 = animalMap[result.d3];
            }
            
            const params = new URLSearchParams({
                mode: currentMode === 'hilo' ? 'ไฮโล' : 'น้ำเต้าปูปลา',
                d1: val1,
                d2: val2,
                d3: val3,
                total: result.total,
                status: result.status
            });
            
            fetch(GOOGLE_SHEET_URL + '?' + params.toString(), { mode: 'no-cors' });
            console.log("ส่งข้อมูลสำเร็จ:", val1, val2, val3);
        }

        function startShake() {
            if (navigator.vibrate) navigator.vibrate(50);
            const s = document.getElementById('shakeSound'); s.currentTime = 0; s.play().catch(()=>{});
            
            document.getElementById('diceGroup').style.visibility = "hidden";
            const cover = document.getElementById('singleCover');
            cover.style.display = "block";
            cover.classList.add('shaking-cover');
            
            document.getElementById('rollInitial').style.display = "none";
            document.getElementById('rollSecondary').style.display = "none";
            document.getElementById('statusLabel').innerText = "กำลังเขย่า...";
            resetUI();

            setTimeout(() => {
                cover.classList.remove('shaking-cover');
                result.d1 = Math.floor(Math.random() * 6) + 1;
                result.d2 = Math.floor(Math.random() * 6) + 1;
                result.d3 = Math.floor(Math.random() * 6) + 1;
                result.total = result.d1 + result.d2 + result.d3;
                result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
                result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");

                sendToGoogleSheet();

                document.getElementById('statusLabel').innerText = "ปิดฝาแล้ว!";
                document.getElementById('rollSecondary').style.display = "flex";
            }, 1200);
        }

        async function revealResults() {
            document.getElementById('rollSecondary').style.display = "none";
            const op = document.getElementById('openSound'); op.currentTime = 0; op.play().catch(()=>{});
            document.getElementById('singleCover').style.display = "none";
            document.getElementById('diceGroup').style.visibility = "visible";
            
            const dice = [result.d1, result.d2, result.d3];
            const isRed = (v) => (v === 1 || v === 4);
            
            dice.forEach((val, i) => {
                const box = document.getElementById(`d${i+1}`);
                const label = document.getElementById(`label${i+1}`);
                const prefix = (currentMode === 'hilo') ? 'h' : '';
                box.innerHTML = `<img src="${prefix}${val}.jpg">`;
                box.style.borderColor = isRed(val) ? "var(--red-die)" : "transparent";
                label.innerText = (currentMode === 'hilo') ? val : animalMap[val];
                label.className = `item-label ${isRed(val) ? 'red-text' : 'yellow-text'}`;
            });

            const getT = (v) => `<div class="tod-box" style="border-color:${isRed(v)?'var(--red-die)':'transparent'}"><img src="${currentMode==='hilo'?'h':''}${v}.jpg"></div>`;
            document.getElementById('todDisplay').innerHTML = `<div class="tod-row">${getT(result.d1)}${getT(result.d2)}</div><div class="tod-row">${getT(result.d1)}${getT(result.d3)}</div><div class="tod-row">${getT(result.d2)}${getT(result.d3)}</div>`;

            document.getElementById('statusLabel').innerText = `${result.status} (${result.total})`;
            document.getElementById('statusLabel').className = "status-text " + result.class;
            addToHistory();

            for (let val of dice) { await playVoice(`${(currentMode === 'hilo') ? 'n' : 'a'}${val}.mp3`); }
            if (currentMode === 'hilo') {
                let sVoice = result.total === 11 ? "hilo11.mp3" : (result.total <= 10 ? "low.mp3" : "high.mp3");
                await playVoice(sVoice);
            }

            document.getElementById('rollInitial').style.display = "block";
            document.getElementById('rollInitial').querySelector('button').innerText = "เขย่ารอบใหม่";
        }

        function playVoice(f) {
            return new Promise((resolve) => {
                const a = new Audio(f); a.playbackRate = 1.5;
                a.play().catch(() => resolve()); a.onended = resolve;
                setTimeout(resolve, 800);
            });
        }

        function addToHistory() {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            const f = (v) => (v==1||v==4) ? `<span class="red-num">${currentMode==='hilo'?v:animalMap[v]}</span>` : (currentMode==='hilo'?v:animalMap[v]);
            item.innerHTML = `<span>[${f(result.d1)},${f(result.d2)},${f(result.d3)}]</span><span class="${result.class}">${result.status}</span><span>${result.total}</span>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 5) list.removeChild(list.lastChild);
        }
        
        window.onload = resetUI;
    </script>
</body>
</html>
