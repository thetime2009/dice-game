<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Dice Master Pro</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg-color: #1a1a1a; }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; color: white; 
            transition: background-color 0.5s ease;
        }

        /* ปุ่มเปลี่ยนสีพื้นหลัง */
        .theme-switcher { margin-top: 20px; display: flex; gap: 10px; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; }

        /* การ์ดเกมหลัก */
        .game-card {
            background: #111; border: 3px solid #f1c40f; border-radius: 30px;
            width: 350px; padding: 40px 20px; margin-top: 30px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
        }

        /* รูปภาพลูกเต๋าจำลอง */
        .dice-visuals { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .dice-img { width: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

        /* ช่องแสดงตัวเลข */
        .dice-values { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .val-box { 
            background: white; color: #333; width: 80px; height: 80px; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 45px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .total-text { font-size: 22px; color: #aaa; margin: 10px 0; }
        .result-label { font-size: 35px; font-weight: bold; margin-bottom: 25px; }
        
        /* สีตามเงื่อนไข */
        .high { color: #2ecc71; }
        .low { color: #3498db; }
        .hilo { color: #e74c3c; animation: pulse 1s infinite; }

        button.main-btn { 
            padding: 12px 40px; font-size: 20px; border-radius: 15px; border: none;
            background: #eee; color: #333; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button.main-btn:hover { background: #fff; transform: scale(1.05); }

        /* ส่วนของประวัติ */
        .history-section { width: 350px; margin-top: 30px; padding-bottom: 50px; }
        .history-item { 
            background: rgba(255,255,255,0.1); margin-bottom: 8px; padding: 10px 15px; 
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- เลือกสีพื้นหลัง -->
    <div class="theme-switcher">
        <div class="dot" style="background: #1a1a1a;" onclick="changeBg('#1a1a1a')"></div>
        <div class="dot" style="background: #2c3e50;" onclick="changeBg('#2c3e50')"></div>
        <div class="dot" style="background: #1e3d2b;" onclick="changeBg('#1e3d2b')"></div>
        <div class="dot" style="background: #4a1413;" onclick="changeBg('#4a1413')"></div>
    </div>

    <div class="game-card">
        <div class="dice-visuals">
            <!-- ใช้ Emoji แทนรูปภาพเพื่อให้แสดงผลได้ทันที -->
            <div style="font-size: 50px;">🎲</div>
            <div style="font-size: 50px;">🎲</div>
            <div style="font-size: 50px;">🎲</div>
        </div>

        <div class="dice-values">
            <div id="d1" class="val-box">?</div>
            <div id="d2" class="val-box">?</div>
            <div id="d3" class="val-box">?</div>
        </div>

        <div class="total-text" id="totalScore">แต้มรวม: -</div>
        <div id="statusLabel" class="result-label">-</div>

        <button class="main-btn" onclick="rollDice()">ทอยลูกเต๋า</button>
    </div>

    <div class="history-section">
        <h3>📜 ประวัติการทอย</h3>
        <div id="historyList"></div>
    </div>

    <audio id="diceSound" src="https://soundjay.com"></audio>

    <script>
        function changeBg(color) {
            document.documentElement.style.setProperty('--bg-color', color);
        }

        function rollDice() {
            document.getElementById('diceSound').play();
            
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const d3 = Math.floor(Math.random() * 6) + 1;
            const total = d1 + d2 + d3;

            document.getElementById('d1').innerText = d1;
            document.getElementById('d2').innerText = d2;
            document.getElementById('d3').innerText = d3;
            document.getElementById('totalScore').innerText = `แต้มรวม: ${total}`;

            let status = "";
            let statusClass = "";

            if (total === 11) {
                status = "11-HI-LO";
                statusClass = "hilo";
            } else if (total >= 3 && total <= 10) {
                status = "ต่ำ (LOW)";
                statusClass = "low";
            } else {
                status = "สูง (HIGH)";
                statusClass = "high";
            }

            const label = document.getElementById('statusLabel');
            label.innerText = status;
            label.className = "result-label " + statusClass;

            addToHistory(d1, d2, d3, total, status, statusClass);
        }

        function addToHistory(d1, d2, d3, total, status, statusClass) {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span>[${d1}, ${d2}, ${d3}]</span>
                <strong class="${statusClass}">${status}</strong>
                <span>รวม: ${total}</span>
            `;
            // เพิ่มรายการใหม่ไว้ด้านบนสุด
            historyList.insertBefore(item, historyList.firstChild);
            
            // จำกัดประวัติไว้แค่ 10 รายการล่าสุด
            if (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }
    </script>
</body>
</html>
