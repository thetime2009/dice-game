<script>
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzX21IzoycDNdXkUTP58b-qsRQQQ3bgW0oOG6rmigzYkeRXJIsLLNiquAUztpSAzssrcQ/exec';

// 🔥 TELEGRAM CONFIG
const TELEGRAM_TOKEN = "7585980788:AAHLOxDXYwR668-iThdCk_RI7a7LiWKb0NE";
const CHAT_ID = "5020123278";
let lastSentKey = "";
const SEND_ONLY_11 = true;

let currentMode = 'hilo'; 
let result = { d1: 0, d2: 0, d3: 0, total: 0, status: "", class: "" };
const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

// ✅ SWITCH MODE (แก้เป็น tiger)
function switchMode(mode) {
    currentMode = mode;
    document.getElementById('modeHilo').classList.toggle('active', mode === 'hilo');
    document.getElementById('modeFish').classList.toggle('active', mode === 'tiger');
    resetUI();
}

// ✅ GOOGLE SHEET
function sendToGoogleSheet() {
    if (!GOOGLE_SHEET_URL) return;

    const params = new URLSearchParams({
        mode: currentMode === 'hilo' ? 'ไฮโล' : 'เสือ',
        d1: result.d1,
        d2: result.d2,
        d3: result.d3,
        total: result.total,
        status: result.status
    });

    fetch(GOOGLE_SHEET_URL + "?" + params.toString(), { mode: 'no-cors' });
}

// 🚀 TELEGRAM
function sendToTelegram() {
    if (!TELEGRAM_TOKEN || !CHAT_ID) return;

    if (SEND_ONLY_11 && result.total !== 11) return;

    const key = `${result.d1}-${result.d2}-${result.d3}-${result.total}`;
    if (key === lastSentKey) return;
    lastSentKey = key;

    const modeText = currentMode === 'hilo' ? '🎲 ไฮโล' : '🐯 เสือ';

    const text = `
${modeText}
ผล: ${result.d1}, ${result.d2}, ${result.d3}
รวม: ${result.total}
สถานะ: ${result.status}
`;

    fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    });
}

// 🎲 SHAKE
function startShake() {
    document.getElementById('diceGroup').style.visibility = "hidden";
    const cover = document.getElementById('singleCover');
    cover.style.display = "block";
    cover.classList.add('shaking-cover');

    document.getElementById('rollInitial').style.display = "none";
    document.getElementById('rollSecondary').style.display = "none";
    document.getElementById('statusLabel').innerText = "กำลังเขย่า...";

    setTimeout(() => {
        cover.classList.remove('shaking-cover');

        result.d1 = Math.floor(Math.random() * 6) + 1;
        result.d2 = Math.floor(Math.random() * 6) + 1;
        result.d3 = Math.floor(Math.random() * 6) + 1;
        result.total = result.d1 + result.d2 + result.d3;

        result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
        result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");

        // 🔥 ยิงทันที
        sendToGoogleSheet();
        sendToTelegram();

        document.getElementById('statusLabel').innerText = "ปิดฝาแล้ว!";
        document.getElementById('rollSecondary').style.display = "block";
    }, 1200);
}

// 👇 ที่เหลือใช้ของเดิมได้เลย
function resetUI() {
    document.getElementById('statusLabel').innerText = "-";
}

window.onload = resetUI;
</script>
