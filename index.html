<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILO Master Pro - v2.0.0</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --overlay-bg: rgba(0, 0, 0, 0.6); 
            --card-bg: rgba(26, 26, 26, 0.95);
            --primary-yellow: #f1c40f; 
            --red-die: #e74c3c; 
        }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(var(--overlay-bg), var(--overlay-bg)), url('board.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; transition: 0.5s ease;
        }

        /* --- ส่วนหัวดีไซน์ใหม่ (Header Control Center) --- */
        .header-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        
        .mode-switcher { 
            display: flex; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 20px; 
            width: 100%; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .mode-btn { 
            flex: 1; padding: 12px; border-radius: 15px; border: none; background: none; 
            color: #aaa; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px;
        }
        .mode-btn.active { background: var(--primary-yellow); color: #111; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); }

        .control-panel {
            background: rgba(0,0,0,0.8); border-radius: 25px; padding: 12px 20px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

        /* รายการสีพื้นหลัง 10 สี */
        .theme-switcher { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .dot { 
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.5); transition: 0.2s; flex-shrink: 0;
        }
        .dot:hover { transform: scale(1.2); border-color: white; }

        .speed-control { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 15px; }
        .speed-btn { 
            background: #444; color: white; border: none; width: 26px; height: 26px; 
            border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        #speedVal { font-size: 16px; min-width: 30px; text-align: center; color: var(--primary-yellow); font-weight: bold; }

        /* --- ตัวเกม --- */
        .game-card { 
            width: 100%; max-width: 600px; background: var(--card-bg); backdrop-filter: blur(10px);
            border: 2px solid var(--primary-yellow); border-radius: 40px; padding: 25px; text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); position: relative; margin-bottom: 20px; overflow: hidden;
        }

        .dice-area { 
            position: relative; width: 100%; height: 480px; margin-bottom: 10px; 
            display: flex; justify-content: center; align-items: center;
            background-image: url('plate.png'); background-size: 600px; 
            background-repeat: no-repeat; background-position: center;
        }

        #singleCover { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 520px; height: 520px; 
            background-image: url('cover.png'); background-size: contain; background-repeat: no-repeat; background-position: center; 
            z-index: 30; transition: transform 2.0s cubic-bezier(0.45, 0.05, 0.55, 0.95), opacity 1.5s; 
        }
        #singleCover.open { transform: translate(-50%, -160%); opacity: 0; pointer-events: none; }
        .shaking-cover { animation: shakeCover 0.1s infinite !important; transition: none !important; }

        .main-results { display: flex; justify-content: center; gap: 10px; width: 100%; position: relative; z-index: 10; padding-top: 15px; }
        .dice-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 170px; }
        .result-box { width: 150px; height: 150px; background: white; border-radius: 22px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 4px solid transparent; }
        .result-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-label { font-size: 80px; font-weight: bold; min-height: 90px; color: var(--primary-yellow) !important; text-shadow: 2px 4px 8px rgba(0,0,0,0.8); line-height: 1.1; }

        .btn-gold { width: 100%; padding: 18px 5px; background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #967a06; }
        .btn-group { display: flex; justify-content: center; gap: 10px; width: 100%; }

        @media (max-width: 600px) {
            .dice-area { height: 320px; background-size: 380px; }
            #singleCover { width: 340px; height: 340px; }
            .dice-wrapper { width: 100px; gap: 5px; }
            .result-box { width: 90px; height: 90px; border-radius: 15px; }
            .item-label { font-size: 45px; min-height: 50px; }
        }

        @keyframes shakeCover { 0%, 100% { transform: translate(-50%, -50%) rotate(0deg); } 25% { transform: translate(-51%, -51%) rotate(-1deg); } 50% { transform: translate(-49%, -49%) rotate(1deg); } }
    </style>
</head>
<body>

    <div class="header-container">
        <!-- 1. เลือกโหมดเกม -->
        <div class="mode-switcher">
            <button id="modeHilo" class="mode-btn active" onclick="switchMode('hilo')">ไฮโล</button>
            <button id="modeFish" class="mode-btn" onclick="switchMode('fish')">น้ำเต้าปูปลา</button>
        </div>

        <!-- 2. แผงควบคุมดีไซน์ใหม่ -->
        <div class="control-panel">
            <div class="panel-row">
                <div style="font-size: 13px; font-weight: bold; color: #888;">THEME COLORS</div>
                <div style="color:#fff; font-size:12px; font-weight:bold; opacity:0.6;">V.2.0.0</div>
            </div>
            
            <!-- เพิ่มสีพื้นหลัง 10 สี -->
            <div class="theme-switcher">
                <div class="dot" style="background: #121212;" onclick="changeBg('rgba(0,0,0,0.7)')"></div>
                <div class="dot" style="background: #1e3d2b;" onclick="changeBg('rgba(30,61,43,0.7)')"></div>
                <div class="dot" style="background: #2c3e50;" onclick="changeBg('rgba(44,62,80,0.7)')"></div>
                <div class="dot" style="background: #4a1413;" onclick="changeBg('rgba(74,20,19,0.7)')"></div>
                <div class="dot" style="background: #3b1e3d;" onclick="changeBg('rgba(59,30,61,0.7)')"></div>
                <div class="dot" style="background: #1e3d3d;" onclick="changeBg('rgba(30,61,61,0.7)')"></div>
                <div class="dot" style="background: #333333;" onclick="changeBg('rgba(51,51,51,0.7)')"></div>
                <div class="dot" style="background: #3d2b1e;" onclick="changeBg('rgba(61,43,30,0.7)')"></div>
                <div class="dot" style="background: #1e213d;" onclick="changeBg('rgba(30,33,61,0.7)')"></div>
                <div class="dot" style="background: #3d3d1e;" onclick="changeBg('rgba(61,61,30,0.7)')"></div>
            </div>

            <div class="panel-row" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
                <div style="font-size: 13px; font-weight: bold; color: #888;">VOICE SPEED</div>
                <div class="speed-control">
                    <button class="speed-btn" onclick="adjustSpeed(-0.1)">-</button>
                    <span id="speedVal">1.3</span>
                    <button class="speed-btn" onclick="adjustSpeed(0.1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="game-card">
        <div class="dice-area">
            <div id="singleCover"></div>
            <div id="diceGroup" class="main-results" style="opacity: 0;">
                <div class="dice-wrapper"><div id="d1" class="result-box"></div><div id="label1" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d2" class="result-box"></div><div id="label2" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d3" class="result-box"></div><div id="label3" class="item-label"></div></div>
            </div>
        </div>
        <div id="statusLabel" style="font-size:26px; font-weight:bold; margin:10px 0;">-</div>
        <div id="rollInitial"><button class="btn-gold" onclick="startShake('normal')">เขย่าลูกเต๋า</button></div>
        <div id="rollSecondary" style="display:none;"><div class="btn-group"><button style="background:#333; color:#fff; flex:1; border:none; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="startShake('rinBao')">รินเบา</button><button style="background:#bbb; color:#111; flex:1; border:none; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="startShake('rinNak')">รินหนัก</button><button id="openBtn" class="btn-gold" style="flex:1.4;" onclick="revealResults()">เปิดดูแต้ม</button></div></div>
        <div id="todDisplay" style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:20px;"></div>
    </div>

    <audio id="shakeSound" src="shake.mp3"></audio>
    <audio id="openSound" src="open.mp3"></audio>

    <script>
        const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzBOO8QhRgKmyM_XqlFioUcRmdK7zrvApY6BQY3bK8FQDZMnb3jCE04mXNdGXcVYGdzRQ/exec'; 
        let currentMode = 'hilo', voiceSpeed = 1.3, result = { d1: 0, d2: 0, d3: 0, total: 0, status: "", class: "" };
        const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

        function adjustSpeed(val) { voiceSpeed = Math.min(Math.max(voiceSpeed + val, 1.0), 2.5); document.getElementById('speedVal').innerText = voiceSpeed.toFixed(1); }
        function switchMode(mode) { 
            currentMode = mode; 
            document.getElementById('modeHilo').classList.toggle('active', mode === 'hilo');
            document.getElementById('modeFish').classList.toggle('active', mode === 'fish');
            resetUI(); 
        }
        function resetUI() {
            document.getElementById('statusLabel').innerText = "-";
            document.getElementById('diceGroup').style.opacity = "0";
            document.querySelectorAll('.item-label').forEach(el => el.innerText = "");
            document.querySelectorAll('.result-box').forEach(b => { b.innerHTML = ""; b.style.borderColor = "transparent"; });
            document.getElementById('todDisplay').innerHTML = "";
            const cover = document.getElementById('singleCover'); cover.classList.remove('open', 'shaking-cover'); cover.style.display = "none";
        }
        function changeBg(rgbaColor) { document.documentElement.style.setProperty('--overlay-bg', rgbaColor); }
        function sendData() {
            if (!GOOGLE_SHEET_URL) return;
            let v1 = result.d1, v2 = result.d2, v3 = result.d3;
            if (currentMode === 'fish') { v1 = animalMap[result.d1]; v2 = animalMap[result.d2]; v3 = animalMap[result.d3]; }
            const params = new URLSearchParams({ mode: currentMode === 'hilo' ? 'ไฮโล' : 'น้ำเต้าปูปลา', d1: v1, d2: v2, d3: v3, total: result.total, status: result.status });
            fetch(GOOGLE_SHEET_URL + '?' + params.toString(), { mode: 'no-cors' });
        }
        function startShake(shakeType) {
            let sFile = shakeType === 'rinBao' ? 'shake_light.mp3' : (shakeType === 'rinNak' ? 'shake_heavy.mp3' : 'shake.mp3');
            new Audio(sFile).play().catch(()=>{});
            const cover = document.getElementById('singleCover');
            const statusLabel = document.getElementById('statusLabel');
            document.getElementById('diceGroup').style.opacity = "0";
            statusLabel.innerText = shakeType === 'rinBao' ? "กำลังรินเบาๆ..." : (shakeType === 'rinNak' ? "กำลังรินหนัก..." : "กำลังเขย่า...");
            cover.classList.remove('open'); cover.style.display = "block";
            setTimeout(() => { cover.classList.add('shaking-cover'); }, 10);
            document.getElementById('rollInitial').style.display = "none";
            document.getElementById('rollSecondary').style.display = "none";
            setTimeout(() => {
                cover.classList.remove('shaking-cover');
                if (shakeType === 'normal' || shakeType === 'rinNak') {
                    result.d1 = Math.floor(Math.random() * 6) + 1;
                    result.d2 = Math.floor(Math.random() * 6) + 1;
                    result.d3 = Math.floor(Math.random() * 6) + 1;
                    result.total = result.d1 + result.d2 + result.d3;
                    result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
                    result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");
                    sendData();
                }
                statusLabel.innerText = "ปิดฝาแล้ว!";
                document.getElementById('rollSecondary').style.display = "flex";
            }, 1200);
        }
        async function revealResults() {
            document.getElementById('rollSecondary').style.display = "none";
            new Audio('open.mp3').play().catch(()=>{});
            document.getElementById('singleCover').classList.add('open');
            const dice = [result.d1, result.d2, result.d3];
            const isRed = (v) => (v === 1 || v === 4);
            dice.forEach((val, i) => {
                const box = document.getElementById(`d${i+1}`);
                const label = document.getElementById(`label${i+1}`);
                const prefix = currentMode === 'hilo' ? 'h' : '';
                box.innerHTML = `<img src="${prefix}${val}.jpg" style="width:100%; height:100%; object-fit:cover;">`;
                box.style.borderColor = isRed(val) ? "var(--red-die)" : "transparent";
                label.innerText = currentMode === 'hilo' ? val : animalMap[val];
                label.className = `item-label`;
            });
            setTimeout(() => { document.getElementById('diceGroup').style.opacity = "1"; }, 150);
            const getT = (v) => `<div style="width:45px; height:45px; border:2px solid ${isRed(v)?'var(--red-die)':'transparent'}; background:white; border-radius:8px; overflow:hidden;"><img src="${currentMode==='hilo'?'h':''}${v}.jpg" style="width:100%; height:100%; object-fit:cover;"></div>`;
            document.getElementById('todDisplay').innerHTML = `<div style="background:rgba(34,34,34,0.8); padding:8px; border-radius:12px; display:flex; gap:8px;">${getT(result.d1)}${getT(result.d2)}</div><div style="background:rgba(34,34,34,0.8); padding:8px; border-radius:12px; display:flex; gap:8px;">${getT(result.d1)}${getT(result.d3)}</div><div style="background:rgba(34,34,34,0.8); padding:8px; border-radius:12px; display:flex; gap:8px;">${getT(result.d2)}${getT(result.d3)}</div>`;
            document.getElementById('statusLabel').innerText = `${result.status} (${result.total})`;
            document.getElementById('statusLabel').style.color = result.class === 'low' ? '#3498db' : (result.class === 'high' ? '#2ecc71' : 'var(--red-die)');
            setTimeout(async () => {
                for (let val of dice) { await playVoice(`${(currentMode === 'hilo') ? 'n' : 'a'}${val}.mp3`); }
                if (currentMode === 'hilo') { await playVoice(result.total === 11 ? "hilo11.mp3" : (result.total <= 10 ? "low.mp3" : "high.mp3")); }
                document.getElementById('rollInitial').style.display = "block";
            }, 600);
        }
        function playVoice(f) {
            return new Promise((resolve) => {
                const a = new Audio(f); a.playbackRate = voiceSpeed;
                a.play().catch(() => resolve()); a.onended = resolve;
                setTimeout(resolve, 1100 / voiceSpeed);
            });
        }
        window.onload = resetUI;
    </script>
</body>
</html>
