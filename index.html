<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILO Master Pro - v2.1.9 (Triangle Mode)</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --overlay-bg: rgb(0, 88, 31); 
            --card-bg: rgba(26, 26, 26, 0.95);
            --primary-yellow: #f1c40f; 
            --red-die: #e74c3c; 
        }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(var(--overlay-bg), var(--overlay-bg)), url('board.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; transition: 0.5s ease;
        }

        /* --- Popups --- */
        #welcomePopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        #welcomePopup.show { opacity: 1; visibility: visible; }
        .welcome-card { background: rgba(30,30,30,0.95); width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 40px; border: 2px solid var(--primary-yellow); text-align: center; box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); transform: scale(0.8); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #welcomePopup.show .welcome-card { transform: scale(1); }
        .welcome-icon { font-size: 50px; margin-bottom: 10px; }
        .welcome-title { font-size: 28px; font-weight: bold; color: var(--primary-yellow); margin-bottom: 5px; }
        .welcome-brand { font-size: 45px; font-weight: bold; color: #fff; text-shadow: 0 0 15px var(--primary-yellow); margin-bottom: 20px; }
        .btn-start { background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; border: none; padding: 15px 40px; border-radius: 20px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #967a06; transition: 0.1s; }

        /* --- UI Elements --- */
        .header-container { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .mode-switcher { display: flex; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 20px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .mode-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; background: none; color: #aaa; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .mode-btn.active { background: var(--primary-yellow); color: #111; }
        .control-panel { background: rgba(0,0,0,0.85); border-radius: 25px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); gap: 15px; width: 100%; }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.4); margin: 0 2px; display: inline-block; }
        .speed-control { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; }
        .speed-btn { background: #444; color: white; border: none; width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
        #speedVal { font-size: 14px; min-width: 25px; text-align: center; color: var(--primary-yellow); font-weight: bold; }

        /* --- Game Card & Plate --- */
        .game-card { width: 100%; max-width: 650px; background: var(--card-bg); backdrop-filter: blur(10px); border: 2px solid var(--primary-yellow); border-radius: 40px; padding: 25px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); position: relative; margin-bottom: 20px; overflow: hidden; }
        .dice-area { position: relative; width: 100%; height: 480px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; background-image: url('plate.png'); background-size: 600px; background-repeat: no-repeat; background-position: center; transition: 0.3s; }
        
        /* --- Triangle Layout (จัดตำแหน่งลูกเต๋าใหม่) --- */
        .main-results { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; position: relative; z-index: 10; padding-top: 15px; opacity: 0; transition: opacity 0.3s; }
        .dice-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 160px; transition: transform 0.5s; }
        /* ลูกที่ 1 และ 3 เลื่อนลง */
        .dice-wrapper:nth-child(1), .dice-wrapper:nth-child(3) { transform: translateY(40px); }
        /* ลูกที่ 2 เลื่อนขึ้น */
        .dice-wrapper:nth-child(2) { transform: translateY(-40px); }

        .result-box { width: 150px; height: 150px; background: white; border-radius: 22px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 4px solid transparent; }
        .result-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-label { font-size: 80px; font-weight: bold; min-height: 90px; color: var(--primary-yellow) !important; text-shadow: 2px 4px 8px rgba(0,0,0,0.8); line-height: 1.1; }

        #singleCover { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 520px; height: 520px; background-image: url('cover.png'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 30; transition: transform 2.0s cubic-bezier(0.45, 0.05, 0.55, 0.95), opacity 1.5s; display: none; }
        #singleCover.open { transform: translate(-50%, -160%); opacity: 0; pointer-events: none; }
        .shaking-plate { animation: shakePlate 0.1s infinite !important; }
        .shaking-cover { animation: shakeCover 0.1s infinite !important; transition: none !important; }

        /* --- Buttons --- */
        .btn-gold { width: 100%; padding: 18px 5px; background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; font-size: 22px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #967a06; transition: 0.1s; }
        .btn-gold:active { transform: translateY(4px); box-shadow: 0 2px 0 #967a06; }
        
        .results-tray { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); min-width: 320px; justify-content: center; margin-top: 20px; }
        .mini-dice-box { width: 60px; height: 60px; background: white; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #ddd; cursor: pointer; color: #333; font-weight: bold; font-size: 20px; }
        .btn-powder-small { background: #fff !important; color: #111 !important; padding: 10px 25px !important; border-radius: 15px !important; font-size: 18px !important; font-weight: bold; box-shadow: 0 4px 0 #bbb !important; cursor: pointer; border: none; }

        .history-container { width: 100%; max-width: 600px; margin-top: 20px; padding-bottom: 50px; }
        .history-item { background: rgba(30, 30, 30, 0.85); border-radius: 15px; padding: 12px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; border: 1px solid rgba(255,255,255,0.1); }

        @keyframes shakePlate { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-3px, -2px); } 50% { transform: translate(3px, 2px); } }
        @keyframes shakeCover { 0%, 100% { transform: translate(-50%, -50%) rotate(0deg); } 25% { transform: translate(-51%, -51%) rotate(-1deg); } 50% { transform: translate(-49%, -49%) rotate(1deg); } }
        
        @media (max-width: 600px) {
            .dice-area { height: 320px; background-size: 380px; }
            #singleCover { width: 340px; height: 340px; }
            .dice-wrapper { width: 100px; gap: 5px; }
            .dice-wrapper:nth-child(1), .dice-wrapper:nth-child(3) { transform: translateY(25px); }
            .dice-wrapper:nth-child(2) { transform: translateY(-25px); }
            .result-box { width: 90px; height: 90px; }
            .item-label { font-size: 45px; min-height: 50px; }
            .mini-dice-box { width: 45px; height: 45px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- Popup ต้อนรับ -->
    <div id="welcomePopup" class="show">
        <div class="welcome-card">
            <div id="popupIcon" class="welcome-icon">🌟</div>
            <div id="popupTitle" class="welcome-title">ยินดีต้อนรับ</div>
            <div class="welcome-brand">ปิ่นทอง</div>
            <button id="btnPopupAction" class="btn-start" onclick="handlePopupClose()">เริ่มเล่นกันเลย</button>
        </div>
    </div>

    <!-- แผงควบคุมด้านบน -->
    <div class="header-container">
        <div class="mode-switcher">
            <button id="modeHilo" class="mode-btn active" onclick="switchMode('hilo')">ไฮ-โล</button>
            <button id="modeFish" class="mode-btn" onclick="switchMode('fish')">น้ำเต้า-ปู-ปลา</button>
        </div>
        <div class="control-panel">
            <div class="theme-switcher">
                <div class="dot" style="background: #1e3d2b;" onclick="changeBg('rgba(30,61,43,0.7)')"></div>
                <div class="dot" style="background: #121212;" onclick="changeBg('rgba(0,0,0,0.7)')"></div>
                <div class="dot" style="background: #2c3e50;" onclick="changeBg('rgba(44,62,80,0.7)')"></div>
                <div class="dot" style="background: #4a1413;" onclick="changeBg('rgba(74,20,19,0.7)')"></div>
            </div>
            <div class="speed-control">
                <button class="speed-btn" onclick="adjustSpeed(-0.1)">-</button>
                <span id="speedVal">1.3</span>
                <button class="speed-btn" onclick="adjustSpeed(0.1)">+</button>
            </div>
        </div>
    </div>

    <!-- พื้นที่เล่นเกม -->
    <div class="game-card">
        <div id="diceArea" class="dice-area">
            <div id="singleCover"></div>
            <div id="diceGroup" class="main-results">
                <div class="dice-wrapper"><div id="d1" class="result-box"></div><div id="label1" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d2" class="result-box"></div><div id="label2" class="item-label"></div></div>
                <div class="dice-wrapper"><div id="d3" class="result-box"></div><div id="label3" class="item-label"></div></div>
            </div>
        </div>
        <div id="statusLabel" style="font-size:26px; font-weight:bold; margin:10px 0;">-</div>
        
        <div id="rollInitial">
            <button id="btnMainShake" class="btn-gold" onclick="startShake('normal')">เขย่าลูกเต๋า</button>
        </div>
        
        <div id="rollSecondary" style="display:none; gap:10px; justify-content:center;">
            <button style="background:#333; color:#fff; flex:1; border:none; border-radius:15px; font-weight:bold; cursor:pointer; font-size:20px;" onclick="startShake('rinBao')">รินเบา</button>
            <button style="background:#bbb; color:#111; flex:1; border:none; border-radius:15px; font-weight:bold; cursor:pointer; font-size:20px;" onclick="startShake('rinNak')">รินหนัก</button>
            <button class="btn-gold" style="flex:1; font-size:20px;" onclick="revealResults()">เปิดดูแต้ม</button>
        </div>

        <!-- แถบล่าง (Cheat & Lock Screen) -->
        <div class="results-tray">
            <div id="lastDiceRow" style="display:flex; gap:6px;">
                <div class="mini-dice-box" onclick="triggerCheat('low')">ต่ำ</div>
                <div class="mini-dice-box" onclick="triggerCheat('hilo')">11</div>
                <div class="mini-dice-box" onclick="triggerCheat('high')">สูง</div>
            </div>
            <button id="btnLock" class="btn-powder-small" style="background: #333 !important; color: #fff !important; min-width: 90px;" onclick="toggleLock()">🔒 ล็อคจอ</button>
            <button id="btnTaPang" class="btn-powder-small" onclick="triggerPowderPopup()">ทาแป้ง</button>
        </div>
    </div>

    <!-- ประวัติ -->
    <div class="history-container" id="historyList"></div>

    <script>
        // --- ค่าเริ่มต้นและการตั้งค่า ---
        const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzBOO8QhRgKmyM_XqlFioUcRmdK7zrvApY6BQY3bK8FQDZMnb3jCE04mXNdGXcVYGdzRQ/exec'; 
        let currentMode = 'hilo', voiceSpeed = 1.3, isShakingLogic = false, isLocked = false, pendingPowder = false;
        let result = { d1: 1, d2: 1, d3: 1, total: 3, status: "ต่ำ", class: "low" };
        const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

        window.onload = () => { document.getElementById('welcomePopup').classList.add('show'); };

        function handlePopupClose() {
            document.getElementById('welcomePopup').classList.remove('show');
            if (pendingPowder) { applyPowderLogic(); pendingPowder = false; }
        }

        // --- ระบบล็อคหน้าจอ ---
        function toggleLock() {
            const btn = document.getElementById('btnLock');
            isLocked = !isLocked;
            if (isLocked) {
                document.body.style.overflow = "hidden";
                document.body.style.position = "fixed";
                document.body.style.width = "100%";
                btn.innerHTML = "🔓 ปลดล็อค";
                btn.style.setProperty("background", "#e74c3c", "important");
            } else {
                document.body.style.overflow = "auto";
                document.body.style.position = "static";
                btn.innerHTML = "🔒 ล็อคจอ";
                btn.style.setProperty("background", "#333", "important");
            }
        }

        // --- ฟังก์ชันเขย่า (ปรับปรุง Triangle & 4-4-4) ---
        async function startShake(shakeType) {
            if (isShakingLogic) return;
            isShakingLogic = true;

            const cover = document.getElementById('singleCover');
            const diceGroup = document.getElementById('diceGroup');
            const statusLabel = document.getElementById('statusLabel');

            // 1. เตรียมลูกเต๋า 4-4-4 เป็นทรงสามเหลี่ยมและซ่อนตัวเลข Label
            statusLabel.innerText = "เตรียมลูกเต๋า (4-4-4)...";
            const prefix = currentMode === 'hilo' ? 'h' : 'h'; // ใช้ภาพเต๋าเลข 4
            for (let i = 1; i <= 3; i++) {
                const box = document.getElementById(`d${i}`);
                box.innerHTML = `<img src="${prefix}4.jpg" style="width:100%; height:100%; object-fit:cover;">`;
                box.style.borderColor = "var(--red-die)";
                document.getElementById(`label${i}`).innerText = ""; // ซ่อนตัวเลข resout เหลืองๆ
            }
            
            diceGroup.style.opacity = "1";
            await new Promise(r => setTimeout(r, 3000)); // โชว์ทรงสามเหลี่ยม 4-4-4 ค้างไว้ 3 วินาที

            // 2. เริ่มขั้นตอนเขย่า
            diceGroup.style.opacity = "0";
            document.getElementById('btnTaPang').style.display = "none";
            document.getElementById('rollInitial').style.display = "none";
            document.getElementById('rollSecondary').style.display = "none";
            
            new Audio(shakeType === 'rinBao' ? 'shake_light.mp3' : 'shake.mp3').play().catch(()=>{});
            cover.style.display = "block";
            cover.classList.remove('open');
            cover.classList.add('shaking-cover');
            document.getElementById('diceArea').classList.add('shaking-plate');
            statusLabel.innerText = "กำลังเขย่า...";

            setTimeout(() => {
                cover.classList.remove('shaking-cover');
                document.getElementById('diceArea').classList.remove('shaking-plate');
                
                // สุ่มผลจริง (ถ้าไม่ได้กดสูตร)
                if (shakeType === 'normal' || shakeType === 'rinNak') {
                    const r = getRiggedRoll('normal');
                    result = { d1: r.d1, d2: r.d2, d3: r.d3, total: r.total };
                    result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
                    result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");
                    sendToSheet();
                }
                
                statusLabel.innerText = "ปิดฝาเรียบร้อย!";
                document.getElementById('rollSecondary').style.display = "flex";
                isShakingLogic = false;
            }, 1200);
        }

        // --- เปิดดูผล ---
        async function revealResults() {
            if (isShakingLogic) return;
            isShakingLogic = true;
            document.getElementById('rollSecondary').style.display = "none";
            new Audio('open.mp3').play().catch(()=>{});
            document.getElementById('singleCover').classList.add('open');

            const dice = [result.d1, result.d2, result.d3];
            const prefix = currentMode === 'hilo' ? 'h' : '';
            
            dice.forEach((val, i) => {
                const box = document.getElementById(`d${i+1}`);
                box.innerHTML = `<img src="${prefix}${val}.jpg" style="width:100%; height:100%; object-fit:cover;">`;
                box.style.borderColor = (val===1||val===4) ? "var(--red-die)" : "transparent";
                document.getElementById(`label${i+1}`).innerText = currentMode === 'hilo' ? val : animalMap[val];
            });

            setTimeout(() => { document.getElementById('diceGroup').style.opacity = "1"; }, 150);
            document.getElementById('statusLabel').innerText = `${result.status} (${result.total})`;
            document.getElementById('statusLabel').style.color = result.class === 'low' ? '#3498db' : (result.class === 'high' ? '#2ecc71' : 'var(--red-die)');
            
            addToHistory();

            // ขานเสียง
            setTimeout(async () => {
                for (let val of dice) {
                    new Audio(`${currentMode==='hilo'?'n':'a'}${val}.mp3`).play().catch(()=>{});
                    await new Promise(r => setTimeout(r, 1100 / voiceSpeed));
                }
                document.getElementById('rollInitial').style.display = "block";
                document.getElementById('btnTaPang').style.display = "block";
                isShakingLogic = false;
            }, 600);
        }

        // --- ฟังก์ชันเสริม (โกง/ประวัติ/ทาแป้ง) ---
        function getRiggedRoll(target) {
            let d1, d2, d3, total;
            do {
                d1 = Math.floor(Math.random() * 6) + 1;
                d2 = Math.floor(Math.random() * 6) + 1;
                d3 = Math.floor(Math.random() * 6) + 1;
                total = d1 + d2 + d3;
            } while ((target === 'low' && (total > 10 || total === 11)) || (target === 'high' && (total < 12)) || (target === 'hilo' && (total !== 11)));
            return { d1, d2, d3, total };
        }

        function triggerCheat(type) { 
            const r = getRiggedRoll(type);
            result = { d1: r.d1, d2: r.d2, d3: r.d3, total: r.total };
            result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
            document.getElementById('statusLabel').innerText = "ล็อคผล: " + result.status;
            sendToSheet();
        }

        function triggerPowderPopup() {
            if (isShakingLogic) return;
            pendingPowder = true;
            new Audio('powder_popup.mp3').play().catch(()=>{});
            const card = `<div style='text-align:center'>✨ ขอจิตอธิษฐานกับปิ่นทองนะคะ...</div>`;
            showPopup("✨", "ทาแป้งขอหวย", "กำลังเตรียมแป้งปิ่นทอง", card, "เริ่มทาแป้ง");
        }

        function showPopup(icon, title, subtitle, msg, btnText) {
            document.getElementById('popupIcon').innerText = icon;
            document.getElementById('popupTitle').innerText = title;
            document.getElementById('welcomePopup').classList.add('show');
        }

        function applyPowderLogic() {
            isShakingLogic = true;
            const diceArea = document.getElementById('diceArea');
            document.getElementById('statusLabel').innerText = "กำลังทาแป้งขอหวย...";
            diceArea.style.backgroundImage = "url('powder.png')";
            diceArea.classList.add('shaking-plate');
            setTimeout(() => {
                diceArea.classList.remove('shaking-plate');
                diceArea.style.backgroundImage = "url('plate.png')";
                document.getElementById('statusLabel').innerText = "ทาแป้งเรียบร้อย!";
                isShakingLogic = false;
            }, 3000);
        }

        function addToHistory() {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>[${result.d1},${result.d2},${result.d3}]</span> <b>${result.status}</b> <span>${result.total}</span>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 5) list.removeChild(list.lastChild);
        }

        function switchMode(mode) { currentMode = mode; resetUI(); }
        function adjustSpeed(val) { voiceSpeed = Math.min(Math.max(voiceSpeed + val, 1.0), 2.5); document.getElementById('speedVal').innerText = voiceSpeed.toFixed(1); }
        function changeBg(color) { document.documentElement.style.setProperty('--overlay-bg', color); }
        function resetUI() {
            document.getElementById('statusLabel').innerText = "-";
            document.getElementById('diceGroup').style.opacity = "0";
            document.getElementById('singleCover').classList.remove('open');
            document.getElementById('singleCover').style.display = "none";
            document.getElementById('rollInitial').style.display = "block";
            document.getElementById('rollSecondary').style.display = "none";
            isShakingLogic = false;
        }
        function sendToSheet() {
            const p = new URLSearchParams({ mode: currentMode, d1: result.d1, d2: result.d2, d3: result.d3, total: result.total, status: result.status });
            fetch(GOOGLE_SHEET_URL + '?' + p.toString(), { mode: 'no-cors' }).catch(()=>{});
        }
    </script>
</body>
</html>
