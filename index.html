<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HILO Master Pro - v2.1.9 (Fixed)</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
    /* --- Styles & Animations --- */
    :root {
        --overlay-bg: rgb(0, 88, 31);
        --card-bg: rgba(26, 26, 26, 0.95);
        --primary-yellow: #f1c40f;
        --red-die: #e74c3c;
    }
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
    body {
        font-family: 'Kanit', sans-serif; margin: 0; padding: 10px;
        display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        background: linear-gradient(var(--overlay-bg), var(--overlay-bg)), url('board.jpg');
        background-size: cover; background-position: center; background-attachment: fixed;
        color: white; transition: 0.5s ease;
    }

    #welcomePopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.5s; }
    #welcomePopup.show { opacity: 1; visibility: visible; }
    .welcome-card { background: rgba(30,30,30,0.95); width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 40px; border: 2px solid var(--primary-yellow); text-align: center; transform: scale(0.8); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #welcomePopup.show .welcome-card { transform: scale(1); }
    .welcome-icon { font-size: 50px; margin-bottom: 10px; }
    .welcome-title { font-size: 28px; font-weight: bold; color: var(--primary-yellow); }
    .welcome-brand { font-size: 45px; font-weight: bold; color: #fff; text-shadow: 0 0 15px var(--primary-yellow); margin-bottom: 10px; }

    .header-container { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
    .mode-switcher { display: flex; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 20px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
    .mode-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; background: none; color: #aaa; cursor: pointer; font-weight: bold; }
    .mode-btn.active { background: var(--primary-yellow); color: #111; }
    .control-panel { background: rgba(0,0,0,0.85); border-radius: 25px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }
    .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.4); display: inline-block; margin: 0 3px; }

    .game-card { width: 100%; max-width: 650px; background: var(--card-bg); border: 2px solid var(--primary-yellow); border-radius: 40px; padding: 25px; text-align: center; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
    .dice-area { position: relative; width: 100%; height: 480px; display: flex; justify-content: center; align-items: center; background-image: url('plate.png'); background-size: 600px; background-repeat: no-repeat; background-position: center; }
    #singleCover { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 520px; height: 520px; background-image: url('cover.png'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 30; transition: transform 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95), opacity 1s; display: block; }
    #singleCover.open { transform: translate(-50%, -160%); opacity: 0; pointer-events: none; }

    .main-results { display: flex; justify-content: center; gap: 10px; width: 100%; opacity: 0; transition: 0.3s; z-index: 10; }
    .dice-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 160px; }
    .result-box { width: 150px; height: 150px; background: white; border-radius: 22px; border: 4px solid transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .item-label { font-size: 80px; font-weight: bold; color: var(--primary-yellow); text-shadow: 2px 4px 8px #000; min-height: 90px; }

    .btn-gold { width: 100%; padding: 18px; background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #111; font-size: 22px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #967a06; }

    .results-tray { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 20px; justify-content: center; margin-top: 20px; }
    .mini-dice-box { width: 60px; height: 60px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
    .btn-powder-small { background: #fff; color: #111; padding: 10px 20px; border-radius: 15px; font-weight: bold; border: none; cursor: pointer; }

    .history-container { width: 100%; max-width: 600px; margin-top: 20px; padding-bottom: 50px; }
    .history-item { background: rgba(30, 30, 30, 0.85); border-radius: 15px; padding: 12px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; }

    @keyframes shakeAni { 0%, 100% { transform: translate(-50%, -50%); } 25% { transform: translate(-52%, -52%); } 50% { transform: translate(-48%, -48%); } }
    .shaking-plate { animation: shakeAni 0.1s infinite; }
    .shaking-cover { animation: shakeAni 0.1s infinite !important; }

    @media (max-width: 600px) {
        .dice-area { height: 320px; background-size: 380px; }
        #singleCover { width: 340px; height: 340px; }
        .result-box { width: 90px; height: 90px; }
        .item-label { font-size: 45px; min-height: 50px; }
    }
</style>
</head>
<body>

<div id="welcomePopup" class="show">
    <div class="welcome-card">
        <div id="popupIcon" class="welcome-icon">🌟</div>
        <div id="popupTitle" class="welcome-title">ยินดีต้อนรับ</div>
        <div id="popupSubtitle" class="welcome-subtitle">สู่เกมส์ทอยเต๋าพรีเมียม</div>
        <div class="welcome-brand">ปิ่นทอง</div>
        <div id="popupMsg" class="welcome-msg">ขอให้สนุกกับการเล่นนะคะ!</div>
        <button id="btnPopupAction" class="btn-start" onclick="handlePopupClose()">เริ่มเล่นกันเลย</button>
    </div>
</div>

<div class="header-container">
    <div class="mode-switcher">
        <button id="modeHilo" class="mode-btn active" onclick="switchMode('hilo')">ไฮ-โล</button>
        <button id="modeFish" class="mode-btn" onclick="switchMode('fish')">น้ำเต้า-ปู-ปลา</button>
    </div>
    <div class="control-panel">
        <div class="theme-switcher">
            <div class="dot" style="background: #1e3d2b;" onclick="changeBg('rgba(30,61,43,0.7)')"></div>
            <div class="dot" style="background: #121212;" onclick="changeBg('rgba(0,0,0,0.7)')"></div>
            <div class="dot" style="background: #2c3e50;" onclick="changeBg('rgba(44,62,80,0.7)')"></div>
            <div class="dot" style="background: #4a1413;" onclick="changeBg('rgba(74,20,19,0.7)')"></div>
        </div>
        <div class="speed-control">
            <button class="speed-btn" onclick="adjustSpeed(-0.1)">-</button>
            <span id="speedVal">1.3</span>
            <button class="speed-btn" onclick="adjustSpeed(0.1)">+</button>
        </div>
    </div>
</div>

<div class="game-card">
    <div id="diceArea" class="dice-area">
        <div id="singleCover"></div>
        <div id="diceGroup" class="main-results">
            <div class="dice-wrapper"><div id="d1" class="result-box"></div><div id="label1" class="item-label"></div></div>
            <div class="dice-wrapper"><div id="d2" class="result-box"></div><div id="label2" class="item-label"></div></div>
            <div class="dice-wrapper"><div id="d3" class="result-box"></div><div id="label3" class="item-label"></div></div>
        </div>
    </div>
    <div id="statusLabel" style="font-size:26px; font-weight:bold; margin:10px 0;">-</div>
    
    <div id="rollInitial">
        <button id="btnMainShake" class="btn-gold" onclick="startShake('normal')">เขย่าลูกเต๋า</button>
    </div>
    
    <div id="rollSecondary" style="display:none; gap:10px; justify-content:center;">
        <button style="background:#333; color:#fff; flex:1; border:none; border-radius:15px; font-weight:bold; cursor:pointer;" onclick="startShake('rinBao')">รินเบา</button>
        <button style="background:#bbb; color:#111; flex:1; border:none; border-radius:15px; font-weight:bold; cursor:pointer;" onclick="startShake('rinNak')">รินหนัก</button>
        <button class="btn-gold" style="flex:1.4;" onclick="revealResults()">เปิดดูแต้ม</button>
    </div>

    <div class="bottom-section">
        <div id="bottomTray" class="results-tray">
            <div id="lastDiceRow" style="display:flex; gap:6px;">
                <div class="mini-dice-box" onclick="triggerCheat('low')">ต่ำ</div>
                <div class="mini-dice-box" onclick="triggerCheat('hilo')">11</div>
                <div class="mini-dice-box" onclick="triggerCheat('high')">สูง</div>
            </div>
            <button id="btnTaPang" class="btn-powder-small" onclick="triggerPowderPopup()">ทาแป้ง</button>
        </div>
    </div>
</div>

<div class="history-container" id="historyList"></div>

<script>
    // --- ตัวแปรหลัก ---
    const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzBOO8QhRgKmyM_XqlFioUcRmdK7zrvApY6BQY3bK8FQDZMnb3jCE04mXNdGXcVYGdzRQ/exec'; 
    let currentMode = 'hilo', voiceSpeed = 1.3, pendingPowder = false, isShakingLogic = false;
    let result = { d1: 1, d2: 1, d3: 1, total: 3, status: "ต่ำ", class: "low" };
    const animalMap = ["", "ปลา", "กุ้ง", "น้ำเต้า", "เสือ", "ปู", "ไก่"];

    // --- ฟังก์ชัน Popup ---
    function handlePopupClose() {
        document.getElementById('welcomePopup').classList.remove('show');
        if (pendingPowder) {
            pendingPowder = false;
            applyPowderLogic();
        }
        requestMotionPermission();
    }

    function showPopup(icon, title, subtitle, msg, btnText) {
        document.getElementById('popupIcon').innerText = icon;
        document.getElementById('popupTitle').innerText = title;
        document.getElementById('popupSubtitle').innerText = subtitle;
        document.getElementById('popupMsg').innerHTML = msg;
        document.getElementById('btnPopupAction').innerText = btnText;
        document.getElementById('welcomePopup').classList.add('show');
    }

    // --- ระบบล็อคและสุ่ม ---
    function getRiggedRoll(target) {
        let d1, d2, d3, total;
        do {
            d1 = Math.floor(Math.random() * 6) + 1;
            d2 = Math.floor(Math.random() * 6) + 1;
            d3 = Math.floor(Math.random() * 6) + 1;
            total = d1 + d2 + d3;
        } while (
            (target === 'low' && (total > 10 || total === 11)) ||
            (target === 'high' && (total < 12)) ||
            (target === 'hilo' && (total !== 11))
        );
        return { d1, d2, d3, total };
    }

    function triggerCheat(type) {
        if (isShakingLogic) return;
        const rigged = getRiggedRoll(type);
        result.d1 = rigged.d1; result.d2 = rigged.d2; result.d3 = rigged.d3;
        result.total = rigged.total;
        result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
        result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");
        sendToSheet();
        if (navigator.vibrate) navigator.vibrate(25);
        document.getElementById('statusLabel').innerText = "เตรียมผล: " + result.status;
    }

    function sendToSheet() {
        const p = new URLSearchParams({
            mode: currentMode==='hilo'?'ไฮโล':'น้ำเต้าปูปลา',
            d1: currentMode==='fish'?animalMap[result.d1]:result.d1,
            d2: currentMode==='fish'?animalMap[result.d2]:result.d2,
            d3: currentMode==='fish'?animalMap[result.d3]:result.d3,
            total: result.total,
            status: result.status
        });
        fetch(GOOGLE_SHEET_URL + '?' + p.toString(), { mode: 'no-cors' }).catch(()=>{});
    }

    // --- ระบบเขย่า ---
    function startShake(shakeType) {
        if (isShakingLogic) return;
        isShakingLogic = true;
        
        document.getElementById('diceGroup').style.opacity = "0";
        document.getElementById('btnTaPang').style.display = "none";
        
        let sFile = shakeType === 'rinBao' ? 'shake_light.mp3' : (shakeType === 'rinNak' ? 'shake_heavy.mp3' : 'shake.mp3');
        new Audio(sFile).play().catch(()=>{});

        const cover = document.getElementById('singleCover');
        cover.style.display = "block";
        cover.classList.remove('open');
        cover.classList.add('shaking-cover');
        document.getElementById('diceArea').classList.add('shaking-plate');
        
        document.getElementById('statusLabel').innerText = "กำลังเขย่า...";
        document.getElementById('rollInitial').style.display = "none";
        document.getElementById('rollSecondary').style.display = "none";

        setTimeout(() => {
            cover.classList.remove('shaking-cover');
            document.getElementById('diceArea').classList.remove('shaking-plate');
            
            // ถ้าไม่ได้กดโกงไว้ ให้สุ่มปกติ
            if (shakeType === 'normal' || shakeType === 'rinNak') {
                const r = getRiggedRoll('normal');
                result.d1 = r.d1; result.d2 = r.d2; result.d3 = r.d3;
                result.total = r.total;
                result.status = result.total === 11 ? "11-HI-LO" : (result.total <= 10 ? "ต่ำ" : "สูง");
                result.class = result.total === 11 ? "hilo" : (result.total <= 10 ? "low" : "high");
                sendToSheet();
            }
            
            document.getElementById('statusLabel').innerText = "ปิดฝาเรียบร้อย!";
            document.getElementById('rollSecondary').style.display = "flex";
            isShakingLogic = false;
        }, 1200);
    }

    // --- ระบบเปิดฝาและขานเสียง ---
    async function revealResults() {
        if (isShakingLogic) return;
        isShakingLogic = true;
        document.getElementById('rollSecondary').style.display = "none";
        new Audio('open.mp3').play().catch(()=>{});
        
        const cover = document.getElementById('singleCover');
        cover.classList.add('open');

        const dice = [result.d1, result.d2, result.d3];
        const prefix = currentMode === 'hilo' ? 'h' : '';
        
        dice.forEach((val, i) => {
            const box = document.getElementById(`d${i+1}`);
            box.innerHTML = `<img src="${prefix}${val}.jpg" style="width:100%; height:100%; object-fit:cover;">`;
            box.style.borderColor = (val===1||val===4) ? "var(--red-die)" : "transparent";
            document.getElementById(`label${i+1}`).innerText = currentMode === 'hilo' ? val : animalMap[val];
        });

        setTimeout(() => { document.getElementById('diceGroup').style.opacity = "1"; }, 200);
        document.getElementById('statusLabel').innerText = `${result.status} (${result.total})`;
        document.getElementById('statusLabel').style.color = result.class === 'low' ? '#3498db' : (result.class === 'high' ? '#2ecc71' : 'var(--red-die)');
        
        addToHistory();

        // เสียงขาน
        setTimeout(async () => {
            for (let val of dice) {
                const a = new Audio(`${(currentMode === 'hilo') ? 'n' : 'a'}${val}.mp3`);
                a.playbackRate = voiceSpeed; a.play().catch(()=>{});
                await new Promise(r => setTimeout(r, 1100 / voiceSpeed));
            }
            if (currentMode === 'hilo') {
                const fin = new Audio(result.total === 11 ? "hilo11.mp3" : (result.total <= 10 ? "low.mp3" : "high.mp3"));
                fin.playbackRate = voiceSpeed; fin.play().catch(()=>{});
            }
            document.getElementById('rollInitial').style.display = "block";
            document.getElementById('btnTaPang').style.display = "block";
            isShakingLogic = false;
        }, 600);
    }

    // --- ฟังก์ชันเสริม ---
    function triggerPowderPopup() {
        if (isShakingLogic) return;
        pendingPowder = true;
        new Audio('powder_popup.mp3').play().catch(()=>{});
        showPopup("✨", "เตรียมขอหวย", "กำลังจะลงแป้งปิ่นทอง...", "ตั้งจิตอธิษฐานขอกับปิ่นทองนะคะ", "เริ่มทาแป้ง");
    }

    function applyPowderLogic() {
        isShakingLogic = true;
        const diceArea = document.getElementById('diceArea');
        const btnP = document.getElementById('btnTaPang');
        const btnS = document.getElementById('btnMainShake');
        
        document.getElementById('diceGroup').style.opacity = "0";
        btnP.style.display = "none"; 
        btnS.disabled = true;
        
        document.getElementById('statusLabel').innerText = "กำลังทาแป้งขอหวย...";
        diceArea.style.backgroundImage = "url('powder.png')";
        diceArea.classList.add('shaking-plate');
        
        new Audio('shake_light.mp3').play().catch(()=>{});
        setTimeout(() => {
            diceArea.classList.remove('shaking-plate');
            diceArea.style.backgroundImage = "url('plate.png')";
            document.getElementById('statusLabel').innerText = "ทาแป้งเรียบร้อย!";
            btnP.style.display = "block"; 
            btnS.disabled = false;
            isShakingLogic = false;
        }, 3000);
    }

    function addToHistory() {
        const list = document.getElementById('historyList');
        const item = document.createElement('div');
        item.className = 'history-item';
        const f = (v) => (v===1||v===4) ? `<span style="color:var(--red-die); font-weight:bold;">${currentMode==='hilo'?v:animalMap[v]}</span>` : (currentMode==='hilo'?v:animalMap[v]);
        item.innerHTML = `<span>[${f(result.d1)},${f(result.d2)},${f(result.d3)}]</span> <b>${result.status}</b> <span>${result.total}</span>`;
        list.insertBefore(item, list.firstChild);
        if (list.children.length > 5) list.removeChild(list.lastChild);
    }

    function adjustSpeed(val) { 
        voiceSpeed = Math.min(Math.max(voiceSpeed + val, 1.0), 2.5); 
        document.getElementById('speedVal').innerText = voiceSpeed.toFixed(1); 
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('modeHilo').classList.toggle('active', mode === 'hilo');
        document.getElementById('modeFish').classList.toggle('active', mode === 'fish');
        resetUI();
    }

    function changeBg(color) { document.documentElement.style.setProperty('--overlay-bg', color); }

    function resetUI() {
        document.getElementById('statusLabel').innerText = "-";
        document.getElementById('diceGroup').style.opacity = "0";
        document.getElementById('singleCover').classList.remove('open');
        document.getElementById('singleCover').style.display = "block";
        document.getElementById('rollInitial').style.display = "block";
        document.getElementById('rollSecondary').style.display = "none";
        isShakingLogic = false;
    }

    function requestMotionPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().catch(()=>{});
        }
    }
</script>
</body>
</html>
